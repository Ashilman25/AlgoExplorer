services:
  - type: web
    name: algo-explorer-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: algo-explorer-db
          property: connectionString
      - key: ENV
        value: production
      - key: ENFORCE_HTTPS
        value: "true"
      - key: USE_REDIS
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: WARNING
      - key: AUTH_SESSION_HOURS
        value: "168"
      - key: AUTH_PASSWORD_ITERATIONS
        value: "600000"
      - key: RATE_LIMIT_AUTH
        value: "5/minute"
      - key: RATE_LIMIT_GENERAL
        value: "30/minute"
      - key: RATE_LIMIT_READONLY
        value: "60/minute"
      - key: LOCKOUT_MAX_ATTEMPTS
        value: "5"
      - key: LOCKOUT_DURATION_MINUTES
        value: "15"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: algo-explorer-db
    plan: free
    region: oregon
